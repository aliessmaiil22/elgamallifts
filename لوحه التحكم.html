<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة الجمل للمصاعد | Enterprise</title>
    <meta name="theme-color" content="#0b1220">
    <meta name="description" content="شركة الجمل للمصاعد - حلول احترافية للمصاعد وقطع الغيار">
    
    <style>
        body { margin:0; font-family:Cairo,sans-serif; background:#0b1220; color:#fff; direction: rtl; }
        header { display:flex; justify-content:space-between; align-items: center; padding:15px 20px; background:rgba(17,24,39,.85); backdrop-filter:blur(10px); position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(255,255,255,0.05); }
        .logo { font-size:20px; font-weight:700; color:#facc15; text-decoration:none; }
        
        .nav-links { display: flex; align-items: center; gap: 15px; }
        .view-site-btn { background: rgba(250, 204, 21, 0.1); color: #facc15; border: 1px solid #facc15; padding: 6px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .view-site-btn:hover { background: #facc15; color: #0b1220; }

        .main { max-width:1100px; margin:30px auto; padding:0 20px; }
        .form-box { background:#111827; border:1px solid rgba(255,255,255,0.05); padding:25px; border-radius:12px; margin-bottom:30px; }
        .form-box h3 { margin-top:0; color:#facc15; margin-bottom:20px; }
        
        .inp-group { margin-bottom:15px; text-align:right; }
        .inp-group label { display:block; margin-bottom:8px; color:#94a3b8; font-size:14px; }
        input, select { width:100%; padding:12px; background:#0b1220; border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:8px; font-size:15px; }
        input:focus, select:focus { border-color:#facc15; outline:none; }
        
        .add-btn { background:#facc15; color:#0b1220; font-weight:700; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; width:100%; font-size:16px; margin-top:10px; transition:0.3s; }
        .add-btn:hover { background:#e0b712; }

        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px; margin-top:20px; }
        .card { background:#111827; border:1px solid rgba(255,255,255,0.05); padding:15px; border-radius:12px; text-align:center; position:relative; }
        .card img { width:100%; height:180px; object-fit:cover; border-radius:8px; }
        .card h4 { margin:12px 0 4px 0; font-size:17px; }
        .card small { color:#facc15; display:block; margin-bottom:12px; }
        .card button { background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold; width:100%; transition:0.3s; }
        .card button:hover { background:#dc2626; }

        #login { position:fixed; top:0; left:0; width:100%; height:100%; background:#0b1220; display:flex; justify-content:center; align-items:center; z-index:9999; }
        .login-box { background:#111827; padding:40px; border-radius:15px; text-align:center; width:90%; max-width:400px; border:1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="login">
    <div class="login-box">
        <h2 style="color:#facc15; margin-bottom:25px;">لوحة تحكم الإدارة</h2>
        <div class="inp-group">
            <label>أدخل كلمة مرور المسؤول:</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        <button class="add-btn" onclick="login()">تسجيل الدخول 🔑</button>
    </div>
</div>

<header>
    <a href="#" class="logo">لوحة تحكم الجمل للمصاعد</a>
    <div class="nav-links">
        <a href="شركة الجمل للمصاعد.html" class="view-site-btn">عرض الموقع 🌐</a>
    </div>
</header>

<div class="main">
    <div class="form-box">
        <h3>✨ إضافة منتج جديد للموقع</h3>
        <div class="inp-group">
            <label>اسم القطعة أو المنتج:</label>
            <input type="text" id="name" placeholder="مثال: ماكينة مصعد سيكور إيطالي">
        </div>
        <div class="inp-group">
            <label>التصنيف:</label>
            <select id="cat">
                <option value="ماكينات ومحركات">ماكينات ومحركات</option>
                <option value="كوابن وديكورات">كوابن وديكورات</option>
                <option value="لوحات تحكم وكارتات">لوحات تحكم وكارتات</option>
                <option value="أبواب ومستلزماتها">أبواب ومستلزماتها</option>
                <option value="قطع غيار عامة">قطع غيار عامة</option>
            </select>
        </div>
        <div class="inp-group">
            <label>صورة المنتج:</label>
            <input type="file" id="img" accept="image/*">
        </div>
        <button class="add-btn" onclick="add()">حفظ ونشر المنتج على الموقع 🚀</button>
    </div>

    <h3 style="text-align:right; border-right:3px solid #facc15; padding-right:10px;">المنتجات المعروضة حالياً وإدارتها</h3>
    <div id="list" class="grid"></div>
</div>

<script>
    const PASS = "123"; // 🔒 كلمة المرور الخاصة بك

    function get(){ return JSON.parse(localStorage.getItem("products_db")) || []; }
    function set(d){ localStorage.setItem("products_db", JSON.stringify(d)); }

    function login(){
        if(document.getElementById("pass").value === PASS){
            document.getElementById("login").style.display = "none";
            loadAdmin();
        } else {
            alert("❌ كلمة المرور غير صحيحة!");
        }
    }

    function toBase(file){
        return new Promise(r => {
            let fr = new FileReader();
            fr.onload = () => r(fr.result);
            fr.readAsDataURL(file);
        });
    }

    async function add(){
        let name = document.getElementById("name").value;
        let cat = document.getElementById("cat").value;
        let file = document.getElementById("img").files[0];

        if(!name || !file) return alert("⚠️ يرجى كتابة اسم المنتج واختيار صورة له!");

        let img = await toBase(file);
        let d = get();
        d.push({name, cat, img});
        set(d);

        document.getElementById("name").value = "";
        document.getElementById("img").value = "";
        
        loadAdmin();
        // إشعار الصفحة الرئيسية بالتحديث فوراً
        window.dispatchEvent(new Event('storage'));
    }

    function loadAdmin(){
        document.getElementById("list").innerHTML = get().map((p, i) => `
            <div class="card">
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <small>${p.cat}</small>
                <button onclick="del(${i})">حذف المنتج 🗑️</button>
            </div>
        `).join("");
    }

    function del(i){
        if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
            let d = get();
            d.splice(i, 1);
            set(d);
            loadAdmin();
            window.dispatchEvent(new Event('storage'));
        }
    }
</script>
</body>
</html>
